name: PAB CI Actions self-tests
on:
  pull_request:
  push:
    branches: [main, workflows]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  self-tests:
    name: Validate action metadata and helper behavior
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
          quiet: true
      - name: Exercise local setup-uv without private token
        uses: ./.github/actions/setup-uv
        with:
          python-version: "3.13"
          sync-args: "--locked --group test"
      - name: Exercise setup-uv missing-token failure
        id: missing_private_token
        continue-on-error: true
        uses: ./.github/actions/setup-uv
        with:
          python-version: "3.13"
          install-dependencies: "false"
          private-auth-required: "true"
      - name: Assert missing-token failure was safe
        run: test "${{ steps.missing_private_token.outcome }}" = "failure"
      - name: Validate YAML syntax
        run: |
          ruby -e 'ARGV.each { |f| require "psych"; Psych.load_file(f); puts "ok " + f }' \
            $(find .github \( -name '*.yml' -o -name '*.yaml' \) -print)
      - name: Run self-tests
        run: uv run --frozen pytest -q
      - name: Verify no v4 implementation uses stale internal majors
        run: |
          set -euo pipefail
          ! grep -R "PAB_CI_Actions/.github/actions/.*@v[123]" .github/actions
