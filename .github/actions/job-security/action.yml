name: CI Security Job
description: Run Bandit and pip-audit checks.
permissions:
  actions: read
  security-events: write
  contents: read
inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.13"
runs:
  using: composite
  steps:
    - uses: jtdub79/PAB_CI_Actions/.github/actions/setup-uv@v1
      with:
        python-version: ${{ inputs.python-version }}
        cache-key-suffix: security
        install-args: --group security --frozen

    - uses: jtdub79/PAB_CI_Actions/.github/actions/assert-repo-clean@v1

    - name: Run Bandit security scan (informational)
      shell: bash
      continue-on-error: true
      run: uv run bandit -r src -q

    - name: Run pip-audit vulnerability scan (strict)
      shell: bash
      run: uv run pip-audit

    - name: Run OSV vulnerability scan (strict)
      uses: google/osv-scanner-action@v2.3.3
