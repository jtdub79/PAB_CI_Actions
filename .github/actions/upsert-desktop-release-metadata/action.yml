name: Upsert desktop release metadata
description: Submit a prepared desktop release metadata JSON document to the existing server admin endpoint using HTTP Basic authentication.
inputs:
  server-base-url:
    description: Server base URL, without credentials.
    required: true
  platform:
    description: Desktop release platform path segment.
    required: true
  channel:
    description: Desktop release channel path segment.
    required: true
  request-json-file:
    description: Path to a prepared JSON request body owned by the caller.
    required: true
  admin-username:
    description: HTTP Basic admin username.
    required: true
  admin-password:
    description: HTTP Basic admin password.
    required: true
  retry-count:
    description: Number of attempts for transient server failures.
    required: false
    default: "3"
  retry-delay:
    description: Delay between retry attempts in seconds.
    required: false
    default: "2"
outputs:
  http-status:
    description: HTTP status returned by the server.
    value: ${{ steps.submit.outputs.http-status }}
  platform:
    description: Submitted platform.
    value: ${{ steps.submit.outputs.platform }}
  channel:
    description: Submitted channel.
    value: ${{ steps.submit.outputs.channel }}
  response-file:
    description: Local path containing sanitized response diagnostics.
    value: ${{ steps.submit.outputs.response-file }}
runs:
  using: composite
  steps:
    - name: Submit desktop release metadata
      id: submit
      shell: bash
      env:
        SERVER_BASE_URL: ${{ inputs.server-base-url }}
        PLATFORM: ${{ inputs.platform }}
        CHANNEL: ${{ inputs.channel }}
        REQUEST_JSON_FILE: ${{ inputs.request-json-file }}
        ADMIN_USERNAME: ${{ inputs.admin-username }}
        ADMIN_PASSWORD: ${{ inputs.admin-password }}
        RETRY_COUNT: ${{ inputs.retry-count }}
        RETRY_DELAY: ${{ inputs.retry-delay }}
      run: |
        set -euo pipefail
        python "${GITHUB_ACTION_PATH}/scripts/upsert_desktop_release_metadata.py" \
          --server-base-url "${SERVER_BASE_URL}" \
          --platform "${PLATFORM}" \
          --channel "${CHANNEL}" \
          --request-json-file "${REQUEST_JSON_FILE}" \
          --admin-username "${ADMIN_USERNAME}" \
          --admin-password "${ADMIN_PASSWORD}" \
          --retry-count "${RETRY_COUNT}" \
          --retry-delay "${RETRY_DELAY}"
