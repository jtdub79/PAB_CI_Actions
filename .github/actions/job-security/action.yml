name: CI Security Job
description: Run Bandit and pip-audit checks.
inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.13"
runs:
  using: composite
  steps:
    - uses: jtdub79/PAB_CI_Actions/.github/actions/setup-uv@v2
      with:
        python-version: ${{ inputs.python-version }}
        cache-key-suffix: security
        install-args: --no-sources --locked --group security

    - uses: jtdub79/PAB_CI_Actions/.github/actions/assert-repo-clean@v2

    - name: Run Bandit security scan (informational)
      shell: bash
      continue-on-error: true
      run: uv run --frozen --no-sync bandit -r src -q

    - name: Run pip-audit vulnerability scan (strict)
      shell: bash
      run: uv run --frozen --no-sync pip-audit

