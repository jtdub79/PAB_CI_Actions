name: Setup uv environment
description: Set up uv, cache, create venv, and optionally install dependency groups.
inputs:
  python-version:
    description: Python version for uv environment.
    required: true
  cache-key-suffix:
    description: Optional suffix for cache key.
    required: false
    default: ""
  install-args:
    description: Arguments passed to `uv sync`.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache uv
      uses: actions/cache@v5
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv${{ inputs.cache-key-suffix != '' && format('-{0}', inputs.cache-key-suffix) || '' }}-${{ hashFiles('**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv${{ inputs.cache-key-suffix != '' && format('-{0}', inputs.cache-key-suffix) || '' }}-
          ${{ runner.os }}-uv-

    - name: Create venv
      shell: bash
      run: uv venv --python "${{ inputs.python-version }}"

    - name: Install deps
      if: inputs.install-args != ''
      shell: bash
      run: git config --global url."https://${PAB_SHARED_CORE_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/" && uv sync ${{ inputs.install-args }}
